<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now |PipeCraft Plumbing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-4xl mx-auto bg-white min-h-screen shadow-2xl">
        <!-- Header -->
        <div class="bg-blue-900 text-white py-12 px-8">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-5xl">🚰</div>
                    <div>
                        <div class="text-3xl font-bold">PipeCraft Plumbing Solutions</div>
                        <div class="text-blue-300 text-sm">Your property • Our priority • Proven expertise</div>
                    </div>
                </div>
                <a href="index.html" class="text-white hover:text-blue-200 flex items-center gap-2">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
            <h1 class="text-4xl font-bold mt-8">Book Your Service</h1>
        </div>

        <div class="p-8">
            <form id="bookingForm" action="https://formspree.io/f/mlgkpgkl" method="POST" enctype="multipart/form-data" class="space-y-8">
                
                <!-- Personal Info -->
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" name="name" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-blue-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Phone / WhatsApp <span class="text-red-500">*</span></label>
                        <input type="tel" name="phone" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-blue-600 outline-none">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Email</label>
                        <input type="email" name="email" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-blue-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Preferred Date <span class="text-red-500">*</span></label>
                        <input type="date" name="date" id="date" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-blue-600 outline-none">
                    </div>
                </div>

                <!-- Service Selection -->
                <div>
                    <label class="block text-sm font-medium mb-3">Choose Service <span class="text-red-500">*</span></label>
                    <div class="grid md:grid-cols-2 gap-4" id="service-options"></div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Preferred Time</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button type="button" onclick="selectTime(this)" class="time-slot border border-gray-300 hover:border-blue-500 rounded-2xl py-4 text-sm font-medium">Morning (8-11 AM)</button>
                        <button type="button" onclick="selectTime(this)" class="time-slot border border-gray-300 hover:border-blue-500 rounded-2xl py-4 text-sm font-medium">Midday (11 AM-2 PM)</button>
                        <button type="button" onclick="selectTime(this)" class="time-slot border border-gray-300 hover:border-blue-500 rounded-2xl py-4 text-sm font-medium">Afternoon (2-5 PM)</button>
                    </div>
                    <input type="hidden" name="time_slot" id="time_slot">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Full Address / Location <span class="text-red-500">*</span></label>
                    <input type="text" name="address" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-blue-600 outline-none">
                </div>

                <!-- File Upload -->
                <div>
                    <label class="block text-sm font-medium mb-2">Upload Photo / Document (Optional)</label>
                    <div class="border-2 border-dashed border-gray-300 rounded-3xl p-8 text-center hover:border-blue-400 transition-colors">
                        <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-3"></i>
                        <p class="font-medium">Click to upload or drag & drop</p>
                        <p class="text-sm text-gray-500 mt-1">JPG, PNG, PDF, DOCX, etc. (Max 10MB)</p>
                        <input type="file" name="attachment" id="fileUpload" 
                               class="hidden" accept="image/*,.pdf,.doc,.docx,.txt">
                        <button type="button" onclick="document.getElementById('fileUpload').click()" 
                                class="mt-4 px-6 py-3 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm font-medium">
                            Select File
                        </button>
                    </div>
                    <p id="fileName" class="text-sm text-green-600 mt-2 text-center"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Additional Information</label>
                    <textarea name="message" rows="4" class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:border-blue-600 outline-none"></textarea>
                </div>

                <!-- Price Summary -->
                <div class="bg-blue-50 border border-blue-100 rounded-3xl p-6">
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-lg">Estimated Total</span>
                        <span id="total-price" class="text-3xl font-bold text-blue-700">KSh 0</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Final price confirmed after site visit</p>
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-7 rounded-3xl transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-paper-plane"></i>
                    SUBMIT BOOKING REQUEST
                </button>
            </form>
        </div>
    </div>

    <script>
        // ... (Keep all your previous script for services, time slots, etc.)

        const services = [
            { name: "Full Plumbing Maintenance", price:  1},
            { name: "Annual Inspection + Report", price: 5000 },
            { name: "Drain & Sewer Cleaning", price:  1},
            { name: "Water Heater Service", price: 1},
            { name: "Leak Detection & Repair", price: 1},
            { name: "Emergency Callout", price:  1}
        ];

        let selectedService = null;

        function renderServices() {
            const container = document.getElementById('service-options');
            container.innerHTML = services.map((service, i) => `
                <div onclick="selectService(${i}, this)" 
                     class="service-option cursor-pointer border-2 border-transparent hover:border-blue-500 bg-white rounded-3xl p-6 transition-all">
                    <div class="font-semibold">${service.name}</div>
                    <div class="text-2xl font-bold text-blue-600 mt-2">KSh ${service.price}</div>
                </div>
            `).join('');
        }

        function selectService(index, element) {
            document.querySelectorAll('.service-option').forEach(el => el.classList.remove('border-blue-600', 'bg-blue-50'));
            element.classList.add('border-blue-600', 'bg-blue-50');
            selectedService = services[index];
            updateTotal();
        }

        function selectTime(btn) {
            document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('border-blue-600', 'bg-blue-50'));
            btn.classList.add('border-blue-600', 'bg-blue-50');
            document.getElementById('time_slot').value = btn.textContent;
        }

        function updateTotal() {
            const totalEl = document.getElementById('total-price');
            if (selectedService) totalEl.textContent = `KSh ${selectedService.price}`;
        }

        // File name display
        document.getElementById('fileUpload').addEventListener('change', function() {
            const fileNameEl = document.getElementById('fileName');
            if (this.files.length > 0) {
                fileNameEl.textContent = `✅ Selected: ${this.files[0].name}`;
            }
        });

        renderServices();

        // Set minimum date
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').setAttribute('min', today);

        // Form feedback
        document.getElementById('bookingForm').addEventListener('submit', function() {
            if (!selectedService) {
                alert("Please select a service before submitting.");
                return false;
            }
        });
    </script>
</body>
</html>
